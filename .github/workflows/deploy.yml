name: GitHub Pages 배포

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'site/public/data.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: 의존성 설치
        run: npm ci
        working-directory: site

      - name: 사이트 빌드
        run: npm run build
        working-directory: site
        env:
          # 저장소명이 base URL이 됨 (예: /ipgyeol-2026/)
          SITE_BASE: /${{ github.event.repository.name }}/

      - name: 원본 파일을 dist에 복사 (뷰어 서빙용)
        run: |
          mkdir -p site/dist/data/raw
          cp -r data/raw/. site/dist/data/raw/

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages 배포
        uses: actions/deploy-pages@v4
        id: deployment
